{% extends 'masterpage.html' %}
{% load static %}
{% block title %}Payment Success{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <i class="bi bi-check-circle-fill" style="font-size: 5rem; color: green;"></i>
            <h2>Payment Successful!</h2>
            <p>{{ message|default:"Thank you for your purchase. Your order has been confirmed." }}</p>
            <a href="{% url 'myorders' %}" class="btn btn-success">View My Orders</a>
            <a href="{% url 'index' %}" class="btn btn-secondary ms-2">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
